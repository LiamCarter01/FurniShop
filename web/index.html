<!DOCTYPE html>
<html>
<head>
  <base href="/">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="FurniShop - Furniture E-Commerce App">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="FurniShop">
  <title>FurniShop</title>
</head>
<body>
  <script src="flutter.js" defer></script>
  <script>
    window.addEventListener('load', function() {
      var config = { renderer: "html" };
      _flutter.loader.loadEntrypoint({
        onEntrypointLoaded: async function(engineInitializer) {
          var appRunner = await engineInitializer.initializeEngine(config);
          await appRunner.runApp();
        }
      });
    });
  </script>
</body>
</html>
