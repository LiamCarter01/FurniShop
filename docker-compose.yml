services:
  furnishop:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: furnishop-app
    ports:
      - "3000:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  flutter_cache:
